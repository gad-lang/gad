# Workspace configuration for the Gad samples.
# `gad fmt` reads the `fmt:` key (keys match `gad fmt` flags without `--`);
# `gad ide` reads and writes both keys (it adds ide.breakpoints, ide.run, etc.
# as you use it).

fmt:
  # Keep collections compact on one line where possible.
  no-array-item-in-new-line: true
  no-dict-item-in-new-line: true
  no-call-params-in-new-line: true

ide:
  # Layout (the IDE updates these as you resize panels / switch theme).
  theme: dark
  sidebarWidth: 240
  outputHeight: 200
