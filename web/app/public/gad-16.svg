<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
    <defs>
        <style>
            .base-dark  { fill: #0D1B2A; } /* Contornos grossos para garantir contraste */
            .fur-orange { fill: #D97706; } /* Pele principal da gazela */
            .fur-light  { fill: #FEF3C7; } /* Faixa central e orelhas */
            .horn-silver{ fill: #BDC3C7; } /* Chifres claros e visíveis */
            .eye-white  { fill: #FFFFFF; } /* Olhos grandes estilo Go */
        </style>
    </defs>

    <!-- CHIFRES (Simplificados para blocos de pixels nítidos) -->
    <rect x="5" y="0" width="2" height="4" class="base-dark" />
    <rect x="5" y="1" width="1" height="3" class="horn-silver" />

    <rect x="9" y="0" width="2" height="4" class="base-dark" />
    <rect x="10" y="1" width="1" height="3" class="horn-silver" />

    <!-- ORELHAS LATERAIS -->
    <rect x="1" y="5" width="3" height="2" class="base-dark" />
    <rect x="2" y="5" width="2" height="1" class="fur-orange" />

    <rect x="12" y="5" width="3" height="2" class="base-dark" />
    <rect x="12" y="5" width="2" height="1" class="fur-orange" />

    <!-- CABEÇA BASE (Formato afunilado de gazela) -->
    <rect x="3" y="4" width="10" height="9" class="base-dark" />
    <rect x="4" y="5" width="8" height="7" class="fur-orange" />

    <!-- LISTRA FACIAL CENTRAL (Identidade da Gazela) -->
    <rect x="7" y="5" width="2" height="8" class="fur-light" />
    <rect x="7" y="12" width="2" height="1" class="base-dark" /> <!-- Nariz -->

    <!-- OLHOS GIGANTES (Estilo Mascote do Go - Ocupam grande parte da face) -->
    <!-- Olho Esquerdo -->
    <rect x="4" y="6" width="3" height="3" class="base-dark" />
    <rect x="4" y="6" width="2" height="2" class="eye-white" />
    <rect x="5" y="7" width="1" height="1" class="base-dark" /> <!-- Pupila -->

    <!-- Olho Direito -->
    <rect x="9" y="6" width="3" height="3" class="base-dark" />
    <rect x="10" y="6" width="2" height="2" class="eye-white" />
    <rect x="10" y="7" width="1" height="1" class="base-dark" /> <!-- Pupila -->
</svg>