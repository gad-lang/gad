<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
    <defs>
        <style>
            .outline-dark { fill: #0D1B2A; } /* Contornos principais */
            .fur-main     { fill: #D97706; } /* Pele da gazela */
            .fur-shadow   { fill: #B45309; } /* Detalhes faciais escuros */
            .fur-white    { fill: #FEF3C7; } /* Listra branca central */
            .horn-gray    { fill: #BDC3C7; } /* Chifres prateados */
            .eye-white    { fill: #FFFFFF; } /* Globo ocular */
        </style>
    </defs>

    <!-- CHIFRES DA GAZELA (Com ranhuras detalhadas) -->
    <!-- Esquerdo -->
    <rect x="11" y="0" width="2" height="9" class="outline-dark" />
    <rect x="11" y="1" width="1" height="8" class="horn-gray" />
    <rect x="11" y="3" width="1" height="1" class="outline-dark" />
    <rect x="11" y="6" width="1" height="1" class="outline-dark" />
    <!-- Direito -->
    <rect x="19" y="0" width="2" height="9" class="outline-dark" />
    <rect x="20" y="1" width="1" height="8" class="horn-gray" />
    <rect x="20" y="3" width="1" height="1" class="outline-dark" />
    <rect x="20" y="6" width="1" height="1" class="outline-dark" />

    <!-- ORELHAS LONGAS -->
    <!-- Esquerda -->
    <rect x="3" y="10" width="7" height="3" class="outline-dark" />
    <rect x="4" y="11" width="6" height="1" class="fur-main" />
    <!-- Direita -->
    <rect x="22" y="10" width="7" height="3" class="outline-dark" />
    <rect x="22" y="11" width="6" height="1" class="fur-main" />

    <!-- ESTRUTURA PRINCIPAL DA CABEÇA -->
    <rect x="7" y="8" width="18" height="17" class="outline-dark" />
    <rect x="8" y="9" width="16" height="15" class="fur-main" />

    <!-- DETALHES DAS BOCHECHAS -->
    <rect x="8" y="15" width="2" height="7" class="fur-shadow" />
    <rect x="22" y="15" width="2" height="7" class="fur-shadow" />

    <!-- LISTRA FACIAL E FOCINHO AFUNILADO -->
    <rect x="14" y="9" width="4" height="19" class="fur-white" />
    <!-- Extensão do Focinho para Baixo -->
    <rect x="12" y="20" width="8" height="8" class="outline-dark" />
    <rect x="13" y="20" width="6" height="7" class="fur-white" />
    <rect x="15" y="26" width="2" height="1" class="outline-dark" /> <!-- Nariz -->

    <!-- OLHOS GIGANTES ESTILO GOPHER (Com brilho interno) -->
    <!-- Olho Esquerdo -->
    <rect x="8" y="11" width="6" height="6" class="outline-dark" />
    <rect x="9" y="12" width="4" height="4" class="eye-white" />
    <rect x="11" y="14" width="2" height="2" class="outline-dark" /> <!-- Pupila -->
    <rect x="11" y="14" width="1" height="1" class="eye-white" /> <!-- Brilho -->
    <!-- Olho Direito -->
    <rect x="18" y="11" width="6" height="6" class="outline-dark" />
    <rect x="19" y="12" width="4" height="4" class="eye-white" />
    <rect x="19" y="14" width="2" height="2" class="outline-dark" /> <!-- Pupila -->
    <rect x="19" y="14" width="1" height="1" class="eye-white" /> <!-- Brilho -->
</svg>
