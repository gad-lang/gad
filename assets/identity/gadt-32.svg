<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
    <defs>
        <style>
            .outline-dark { fill: #0D1B2A; }
            .tmpl-cyan     { fill: #06B6D4; }
            .tmpl-shadow   { fill: #0891B2; }
            .tmpl-light    { fill: #E0F7FA; }
            .horn-gray    { fill: #BDC3C7; }
        </style>
    </defs>

    <!-- CHIFRES -->
    <rect x="11" y="0" width="2" height="9" class="outline-dark" />
    <rect x="11" y="1" width="1" height="8" class="horn-gray" />
    <rect x="11" y="3" width="1" height="1" class="outline-dark" />
    <rect x="11" y="6" width="1" height="1" class="outline-dark" />

    <rect x="19" y="0" width="2" height="9" class="outline-dark" />
    <rect x="20" y="1" width="1" height="8" class="horn-gray" />
    <rect x="20" y="3" width="1" height="1" class="outline-dark" />
    <rect x="20" y="6" width="1" height="1" class="outline-dark" />

    <!-- ORELHAS -->
    <rect x="3" y="10" width="7" height="3" class="outline-dark" />
    <rect x="4" y="11" width="6" height="1" class="tmpl-cyan" />
    <rect x="22" y="10" width="7" height="3" class="outline-dark" />
    <rect x="22" y="11" width="6" height="1" class="tmpl-cyan" />

    <!-- CABEÇA -->
    <rect x="7" y="8" width="18" height="17" class="outline-dark" />
    <rect x="8" y="9" width="16" height="15" class="tmpl-cyan" />

    <!-- BOCHECHAS -->
    <rect x="8" y="15" width="2" height="7" class="tmpl-shadow" />
    <rect x="22" y="15" width="2" height="7" class="tmpl-shadow" />

    <!-- LISTRA FACIAL E FOCINHO -->
    <rect x="14" y="9" width="4" height="19" class="tmpl-light" />
    <rect x="12" y="20" width="8" height="8" class="outline-dark" />
    <rect x="13" y="20" width="6" height="7" class="tmpl-light" />
    <rect x="15" y="26" width="2" height="1" class="outline-dark" />

    <!-- OLHOS ESTILO SCHEMATIC (Preenchimento claro, sem pupila preta sólida) -->
    <rect x="8" y="11" width="6" height="6" class="outline-dark" />
    <rect x="9" y="12" width="4" height="4" class="tmpl-light" />
    <rect x="10" y="13" width="2" height="2" class="tmpl-cyan" />

    <rect x="18" y="11" width="6" height="6" class="outline-dark" />
    <rect x="19" y="12" width="4" height="4" class="tmpl-light" />
    <rect x="20" y="13" width="2" height="2" class="tmpl-cyan" />
</svg>
