<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
    <defs>
        <style>
            .outline-dark { fill: #0D1B2A; } /* Contornos principais fortes */
            .fur-main     { fill: #D97706; } /* Pele da gazela (laranja) */
            .fur-shadow   { fill: #B45309; } /* Tons escuros de marcas faciais */
            .fur-white    { fill: #FEF3C7; } /* Faixa central e focinho */
            .horn-gray    { fill: #BDC3C7; } /* Chifre prateado */
            .horn-dark    { fill: #7F8C8D; } /* Sombra do chifre */
            .eye-white    { fill: #FFFFFF; } /* Globo ocular */
        </style>
    </defs>

    <!-- CHIFRES MAIS DETALHADOS (Com profundidade e ranhuras bem definidas) -->
    <!-- Esquerdo -->
    <rect x="23" y="0" width="4" height="18" class="outline-dark" />
    <rect x="23" y="1" width="3" height="17" class="horn-gray" />
    <rect x="23" y="1" width="1" height="17" class="horn-dark" /> <!-- Sombra interna -->
    <rect x="24" y="5" width="2" height="1" class="outline-dark" />  <!-- Ranhura 1 -->
    <rect x="24" y="10" width="2" height="1" class="outline-dark" /> <!-- Ranhura 2 -->
    <rect x="24" y="15" width="2" height="1" class="outline-dark" /> <!-- Ranhura 3 -->
    <!-- Direito -->
    <rect x="37" y="0" width="4" height="18" class="outline-dark" />
    <rect x="38" y="1" width="3" height="17" class="horn-gray" />
    <rect x="38" y="1" width="1" height="17" class="horn-dark" /> <!-- Sombra interna -->
    <rect x="38" y="5" width="2" height="1" class="outline-dark" />  <!-- Ranhura 1 -->
    <rect x="38" y="10" width="2" height="1" class="outline-dark" /> <!-- Ranhura 2 -->
    <rect x="38" y="15" width="2" height="1" class="outline-dark" /> <!-- Ranhura 3 -->

    <!-- ORELHAS LONGAS ANGULADAS -->
    <!-- Esquerda -->
    <rect x="5" y="21" width="14" height="6" class="outline-dark" />
    <rect x="7" y="22" width="12" height="4" class="fur-main" />
    <rect x="9" y="23" width="9" height="2" class="fur-white" /> <!-- Interior da orelha -->
    <!-- Direita -->
    <rect x="45" y="21" width="14" height="6" class="outline-dark" />
    <rect x="45" y="22" width="12" height="4" class="fur-main" />
    <rect x="46" y="23" width="9" height="2" class="fur-white" /> <!-- Interior da orelha -->

    <!-- ESTRUTURA DA CABEÇA -->
    <rect x="15" y="16" width="34" height="34" class="outline-dark" />
    <!-- Cantos arredondados na cabeça -->
    <rect x="17" y="17" width="30" height="32" class="fur-main" />

    <!-- DETALHES DAS BOCHECHAS (Marcas escuras laterais da gazela) -->
    <rect x="17" y="32" width="4" height="13" class="fur-shadow" />
    <rect x="43" y="32" width="4" height="13" class="fur-shadow" />

    <!-- LISTRA FACIAL CENTRAL -->
    <rect x="28" y="17" width="8" height="35" class="fur-white" />

    <!-- FOCINHO E NARIZ ALONGADOS (Efeito afunilado para baixo) -->
    <rect x="24" y="44" width="16" height="16" class="outline-dark" />
    <rect x="25" y="44" width="14" height="15" class="fur-white" />
    <rect x="29" y="56" width="6" height="3" class="outline-dark" /> <!-- Nariz marcante -->

    <!-- OLHOS GRANDES ESTILO GOPHER (Arredondados em 64px e com brilho duplo) -->
    <!-- Olho Esquerdo -->
    <rect x="18" y="23" width="10" height="10" class="outline-dark" />
    <rect x="19" y="24" width="8" height="8" class="eye-white" />
    <!-- Pupila -->
    <rect x="22" y="27" width="4" height="4" class="outline-dark" />
    <!-- Brilhos dos olhos -->
    <rect x="22" y="27" width="2" height="2" class="eye-white" />
    <rect x="25" y="30" width="1" height="1" class="eye-white" />

    <!-- Olho Direito -->
    <rect x="36" y="23" width="10" height="10" class="outline-dark" />
    <rect x="37" y="24" width="8" height="8" class="eye-white" />
    <!-- Pupila -->
    <rect x="38" y="27" width="4" height="4" class="outline-dark" />
    <!-- Brilhos dos olhos -->
    <rect x="38" y="27" width="2" height="2" class="eye-white" />
    <rect x="41" y="30" width="1" height="1" class="eye-white" />
</svg>
